<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid">
    <!-- Brand -->
    <a class="navbar-brand" [routerLink]="homeRoute">
      <i class="fa fa-hospital-o brand-icon" aria-hidden="true"></i>
      <span>{{ title }}</span>
    </a>

    <!-- Toggler -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menu -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-lg-center align-items-start nav-menu">
        <li class="nav-item">
          <a
            class="nav-link"
            [routerLink]="homeRoute"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <i class="fa fa-home" aria-hidden="true"></i>
            <span>Home</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/about"
            routerLinkActive="active"
          >
            <i class="fa fa-info-circle" aria-hidden="true"></i>
            <span>About</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/services"
            routerLinkActive="active"
          >
            <i class="fa fa-stethoscope" aria-hidden="true"></i>
            <span>Services</span>
          </a>
        </li>

        <li class="nav-item user-info" *ngIf="loggedUser">
          <div class="user-chip" title="{{ loggedUser }}">
            <i class="fa fa-user-circle" aria-hidden="true"></i>
            <span>{{ loggedUser }}</span>
          </div>
        </li>

        <li class="nav-item">
          <button type="button" class="logout-btn" (click)="logout()">
            <i class="fa fa-sign-out" aria-hidden="true"></i>
            <span>Logout</span>
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>
