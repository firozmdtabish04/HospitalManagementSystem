<app-header></app-header>

<div class="message-container" *ngIf="message">
  <div class="message-card animate__animated animate__fadeIn">
    <i class="fa fa-check-circle"></i>
    <span>{{ message }}</span>
  </div>
</div>

<div class="main-wrapper">
  <div class="form-container shadow-lg">
    <div class="form-header">
      <div class="icon-circle">
        <i class="fa fa-file-text-o"></i>
      </div>
      <h2 class="title">Medical Prescription</h2>
      <p class="subtitle">Enter patient medication and diagnosis details</p>
    </div>

    <form #addprescriptionform="ngForm" (ngSubmit)="addPrescription()" class="prescription-form">

      <div class="row-flex">
        <div class="form-group flex-item">
          <label for="patientname">Patient Selection <span class="req">*</span></label>
          <div class="input-with-icon">
            <i class="fa fa-user-circle"></i>
            <select class="form-control" id="patientname" name="patientname" [(ngModel)]="prescriptionobj.patientname"
              required #patientname="ngModel">
              <option value="" selected disabled>Select Patient</option>
              <option *ngFor="let patient of appointment | async" [value]="patient.patientname">
                {{ patient.patientname }}
              </option>
            </select>
          </div>
        </div>

        <div class="form-group flex-item">
          <label for="doctorname">Doctor In-charge <span class="req">*</span></label>
          <div class="input-with-icon">
            <i class="fa fa-user-md"></i>
            <input type="text" id="doctorname" class="form-control" placeholder="Dr. Name" name="doctorname"
              [(ngModel)]="prescriptionobj.doctorname" required #doctorname="ngModel">
          </div>
        </div>
      </div>

      <div class="row-flex">
        <div class="form-group flex-item">
          <label for="disease">Diagnosis/Disease <span class="req">*</span></label>
          <div class="input-with-icon">
            <i class="fa fa-heartbeat"></i>
            <input type="text" id="disease" class="form-control" placeholder="e.g. Fever, Diabetes" name="disease"
              [(ngModel)]="prescriptionobj.disease" required #disease="ngModel">
          </div>
        </div>

        <div class="form-group small-item">
          <label for="age">Age <span class="req">*</span></label>
          <input type="number" id="age" class="form-control text-center" placeholder="Yrs" name="age"
            [(ngModel)]="prescriptionobj.age" required #age="ngModel">
        </div>

        <div class="form-group small-item">
          <label for="gender">Gender <span class="req">*</span></label>
          <select class="form-control" id="gender" name="gender" [(ngModel)]="prescriptionobj.gender" required
            #gender="ngModel">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Others">Others</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="prescription">Medication Details & Dosage <span class="req">*</span></label>
        <div class="textarea-wrapper">
          <textarea id="prescription" rows="6" class="form-control"
            placeholder="Enter medicine name, timing, and dosage instructions..." name="prescription"
            [(ngModel)]="prescriptionobj.prescription" required #prescription="ngModel"></textarea>
          <div class="textarea-footer">Please write clearly for the patient's understanding.</div>
        </div>
      </div>

      <div class="btn-wrapper">
        <button [disabled]="addprescriptionform.form.invalid" type="submit" class="submit-btn">
          <i class="fa fa-plus-circle"></i> Submit Prescription
        </button>
      </div>
    </form>
  </div>
</div>

<app-footer></app-footer>
