<app-header></app-header>

<!-- Hamburger -->
<button class="hamburger" (click)="toggleMenu()">
  <i class="fa fa-bars"></i>
</button>

<!-- Sidebar -->
<div class="menu" [class.showMenu]="menuOpen">

  <div class="profile">

    <img src="assets/img/admin.png">

    <h3>{{name}}</h3>

  </div>

  <ul>

    <li routerLink="/addDoctor">
      <i class="fa fa-plus"></i>
      <span>Add Doctor</span>
    </li>

    <li routerLink="/approvedoctors">
      <i class="fa fa-check"></i>
      <span>Approve Doctors</span>
    </li>

    <li routerLink="/doctorlist">
      <i class="fa fa-user-md"></i>
      <span>Doctor List</span>
    </li>

    <li routerLink="/userlist">
      <i class="fa fa-users"></i>
      <span>Users</span>
    </li>

    <li routerLink="/patientlist">
      <i class="fa fa-user"></i>
      <span>Patients</span>
    </li>

  </ul>

</div>


<!-- Dashboard -->

<div class="dashboard">

<h1 class="title">
Admin Dashboard
</h1>

<div class="card-grid">

<!-- USERS -->
<div class="card">

<div class="icon">
<i class="fa fa-users"></i>
</div>

<div class="info">
<h2>Total Users</h2>

<p *ngFor="let user of users | async">
{{user}}
</p>

</div>

</div>


<!-- DOCTORS -->

<div class="card doctor">

<div class="icon">
<i class="fa fa-user-md"></i>
</div>

<div class="info">
<h2>Total Doctors</h2>

<p *ngFor="let doctor of doctors | async">
{{doctor}}
</p>

</div>

</div>


<!-- PATIENTS -->

<div class="card patient">

<div class="icon">
<i class="fa fa-user"></i>
</div>

<div class="info">
<h2>Total Patients</h2>

<p *ngFor="let patient of patients | async">
{{patient}}
</p>

</div>

</div>


<!-- SLOTS -->

<div class="card slot">

<div class="icon">
<i class="fa fa-calendar"></i>
</div>

<div class="info">
<h2>Total Slots</h2>

<p *ngFor="let slot of slots | async">
{{slot}}
</p>

</div>

</div>


<!-- APPOINTMENTS -->

<div class="card appointment">

<div class="icon">
<i class="fa fa-check"></i>
</div>

<div class="info">
<h2>Appointments</h2>

<p *ngFor="let appointment of appointments | async">
{{appointment}}
</p>

</div>

</div>


<!-- PRESCRIPTIONS -->

<div class="card prescription">

<div class="icon">
<i class="fa fa-sticky-note"></i>
</div>

<div class="info">
<h2>Prescriptions</h2>

<p *ngFor="let prescription of prescriptions | async">
{{prescription}}
</p>

</div>

</div>

</div>

</div>


<app-footer></app-footer>
